<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Estudiantes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contenedor">

        <h1>Sistema de Gestión de Estudiantes</h1>

        <form>

            <label for="documento">Documento:</label>
            <input type="text" id="documento" maxlength="15">

            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre">

            <label for="programa">Programa académico:</label>
            <input type="text" id="programa">

            <div class="notas">

                <div>
                    <label for="nota1">Nota 1</label>
                    <input type="number" id="nota1" min="0" max="5" step="0.1">
                </div>

                <div>
                    <label for="nota2">Nota 2</label>
                    <input type="number" id="nota2" min="0" max="5" step="0.1">
                </div>

                <div>
                    <label for="nota3">Nota 3</label>
                    <input type="number" id="nota3" min="0" max="5" step="0.1">
                </div>

            </div>

            <div class="botones">

                <button type="button" id="btnRegistrar">
                    Registrar
                </button>

                <button type="button" id="btnActualizar" disabled>
                    Actualizar
                </button>

                <button type="button" id="btnCancelar" disabled>
                    Cancelar edición
                </button>

            </div>

        </form>

      <h2>Buscar Estudiante</h2>

<label for="buscarDocumento">Documento</label>

<div class="busqueda">

    <input type="text" id="buscarDocumento" maxlength="15">

    <button type="button" id="btnBuscar">
        Buscar
    </button>

</div>

        <h2>Listado de Estudiantes</h2>

        <table>

            <thead>

                <tr>
                    <th>Documento</th>
                    <th>Nombre</th>
                    <th>Programa</th>
                    <th>Promedio</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>

            </thead>

            <tbody id="tablaEstudiantes">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
